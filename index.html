<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فتح حساب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg1:#0ea5e9;
--bg2:#22c55e;
--card:#0b1220cc;
--text:#f8fafc;
--muted:#cbd5e1;
--shadow:0 20px 60px rgba(0,0,0,.35);
--radius:22px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:"Cairo",Arial;
min-height:100vh;
color:var(--text);

background:
radial-gradient(1200px 800px at 10% 10%, rgba(56,189,248,.55), transparent 60%),
radial-gradient(1000px 700px at 90% 20%, rgba(34,197,94,.45), transparent 60%),
linear-gradient(135deg,#060b16,#0b1220);

display:flex;
align-items:center;
justify-content:center;
padding:24px;
}

.wrap{
width:min(480px,100%);
}

.card{
background:var(--card);
backdrop-filter:blur(10px);
border:1px solid rgba(148,163,184,.25);
box-shadow:var(--shadow);
border-radius:var(--radius);
overflow:hidden;
}

.header{
padding:22px;
background:linear-gradient(135deg, rgba(56,189,248,.25), rgba(34,197,94,.18));
border-bottom:1px solid rgba(148,163,184,.18);
}

.title{
margin:0;
font-size:26px;
font-weight:800;
}

.content{
padding:20px;
}

label{
display:block;
margin-top:12px;
margin-bottom:6px;
color:var(--muted);
}

.input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid rgba(148,163,184,.25);
background:rgba(2,6,23,.35);
color:white;
font-size:15px;
}

.row{
margin-top:16px;
}

.btn{
width:100%;
cursor:pointer;
border:none;
padding:12px;
border-radius:12px;
font-weight:bold;
font-size:15px;

background:linear-gradient(135deg,#38bdf8,#22c55e);
}

.result{
margin-top:16px;
padding:12px;
border-radius:12px;
border:1px dashed rgba(148,163,184,.35);
display:none;
}

.result.show{
display:block;
}

</style>
</head>

<body>

<main class="wrap">

<section class="card">

<div class="header">
<h1 class="title">فتح حساب جديد</h1>
</div>

<div class="content">

<label>اسم المستخدم</label>
<input class="input" type="text" id="user">

<label>كلمة السر</label>
<input class="input" type="password" id="pass">

<div class="row">
<button class="btn" onclick="createAccount()">إنشاء حساب</button>
</div>

<div id="result" class="result"></div>

</div>

</section>

</main>

<script>

function createAccount(){

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value
const result=document.getElementById("result")

if(!user||!pass){

result.classList.add("show")
result.innerHTML="اكتب اسم المستخدم وكلمة السر"
return

}

const acc=Math.floor(1000000+Math.random()*9000000)

result.classList.add("show")

result.innerHTML=
"تم إنشاء الحساب بنجاح<br>"+
"اسم المستخدم: "+user+"<br>"+
"رقم الحساب: "+acc

}

</script>

</body>
</html>
