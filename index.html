<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فتح حساب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0ea5e9;
  --bg2:#22c55e;
  --card:#0b1220cc;
  --text:#f8fafc;
  --muted:#cbd5e1;
  --shadow:0 20px 60px rgba(0,0,0,.35);
  --radius:22px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",Arial;
  min-height:100vh;
  color:var(--text);
  background:
    radial-gradient(1200px 800px at 10% 10%, rgba(56,189,248,.55), transparent 60%),
    radial-gradient(1000px 700px at 90% 20%, rgba(34,197,94,.45), transparent 60%),
    linear-gradient(135deg,#060b16,#0b1220);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.wrap{
  width:min(480px,100%);
}

.card{
  background:var(--card);
  backdrop-filter:blur(10px);
  border:1px solid rgba(148,163,184,.25);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
  overflow:hidden;
}

.header{
  padding:22px;
  background:linear-gradient(135deg, rgba(56,189,248,.25), rgba(34,197,94,.18));
  border-bottom:1px solid rgba(148,163,184,.18);
}

.title{
  margin:0;
  font-size:26px;
  font-weight:800;
}

.content{
  padding:20px;
}

label{
  display:block;
  margin-top:12px;
  margin-bottom:6px;
  color:var(--muted);
  font-weight:700;
}

.input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,.25);
  background:rgba(2,6,23,.35);
  color:white;
  font-size:15px;
}

.row{
  margin-top:16px;
}

.btn{
  width:100%;
  cursor:pointer;
  border:none;
  padding:12px;
  border-radius:12px;
  font-weight:800;
  font-size:15px;
  background:linear-gradient(135deg,#38bdf8,#22c55e);
}

.err{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(239,68,68,.45);
  background:rgba(239,68,68,.10);
  display:none;
}

.err.show{
  display:block;
}

/* نافذة النتيجة */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
}

.overlay.show{
  display:flex;
}

.modal{
  width:min(520px,100%);
  background:rgba(11,18,32,.92);
  border-radius:20px;
  padding:20px;
}

.item{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}

.balance{
  margin-top:14px;
  padding:12px;
  border-radius:14px;
  border:1px dashed rgba(34,197,94,.55);
  background:rgba(34,197,94,.10);
  display:flex;
  justify-content:space-between;
}

</style>
</head>

<body>

<main class="wrap">

<section class="card">

<div class="header">
<h1 class="title">فتح حساب جديد</h1>
</div>

<div class="content">

<label>اسم المستخدم</label>
<input class="input" type="text" id="user">

<label>كلمة السر</label>
<input class="input" type="password" id="pass">

<div class="row">
<button class="btn" onclick="createAccount()">إنشاء حساب</button>
</div>

<div id="err" class="err"></div>

</div>

</section>

</main>

<div id="overlay" class="overlay">

<div class="modal">

<h2>✅ تم فتح الحساب</h2>

<div class="item">
<span>اسم المستخدم</span>
<span id="mUser"></span>
</div>

<div class="item">
<span>كلمة السر</span>
<span id="mPass"></span>
</div>

<div class="item">
<span>رقم الحساب</span>
<span id="mAcc"></span>
</div>

<div class="balance">
<span>الرصيد المبدئي</span>
<span id="mBal">2000</span>
</div>

</div>

</div>

<script>

function createAccount(){

const user=document.getElementById("user").value.trim()
const pass=document.getElementById("pass").value.trim()
const err=document.getElementById("err")

if(!user || !pass){

err.classList.add("show")
err.innerHTML="اكتب اسم المستخدم وكلمة السر"
return

}

err.classList.remove("show")

const acc=Math.floor(1000000+Math.random()*9000000)

document.getElementById("mUser").textContent=user
document.getElementById("mPass").textContent=pass
document.getElementById("mAcc").textContent=acc
document.getElementById("mBal").textContent=2000

document.getElementById("overlay").classList.add("show")

}

</script>

</body>
</html>
