<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الأدمن</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#000;
      color:#fff;
      text-align:center;
      padding:40px 20px;
    }

    h1{
      margin-bottom:25px;
    }

    input{
      width:280px;
      max-width:90%;
      padding:12px;
      font-size:18px;
      border:none;
      border-radius:6px;
      margin-bottom:15px;
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:6px;
      background:red;
      color:#fff;
      font-size:16px;
      cursor:pointer;
      margin:5px;
    }

    .box{
      margin:30px auto 0;
      max-width:420px;
      background:#111;
      border:1px solid #333;
      border-radius:10px;
      padding:20px;
      display:none;
      text-align:right;
    }

    .row{
      margin:10px 0;
      font-size:18px;
      word-break:break-word;
    }

    .actions{
      margin-top:20px;
      text-align:center;
    }

    .msg{
      margin-top:20px;
      color:#ffd;
      font-size:16px;
      min-height:24px;
    }
  </style>
</head>
<body>

  <h1>لوحة التحكم</h1>

  <input id="memberNumber" type="text" placeholder="ابحث برقم الحساب" />
  <br />
  <button onclick="searchUser()">بحث</button>

  <div id="msg" class="msg"></div>

  <div id="result" class="box">
    <div class="row"><strong>رقم الحساب:</strong> <span id="rMember"></span></div>
    <div class="row"><strong>اسم المستخدم:</strong> <span id="rUsername"></span></div>
    <div class="row"><strong>الرصيد:</strong> <span id="rPoints"></span></div>
    <div class="row"><strong>الحالة:</strong> <span id="rStatus"></span></div>

    <div class="actions">
      <button onclick="changeStatus('active')">تفعيل</button>
      <button onclick="changeStatus('banned')">حظر</button>
      <button onclick="changeStatus('frozen')">تجميد</button>
      <button onclick="changePoints(100)">+100</button>
      <button onclick="changePoints(-100)">-100</button>
    </div>
  </div>

  <script>
    const API = "https://bank-bebo-ap.onrender.com";
    let currentMember = "";

    function setMsg(text) {
      document.getElementById("msg").textContent = text;
    }

    async function searchUser() {
      const memberNumber = document.getElementById("memberNumber").value.trim();
      const resultBox = document.getElementById("result");

      if (!memberNumber) {
        setMsg("اكتب رقم الحساب أولًا");
        resultBox.style.display = "none";
        return;
      }

      setMsg("جاري البحث...");
      resultBox.style.display = "none";

      try {
        const res = await fetch(API + "/user/" + memberNumber);
        const data = await res.json();

        if (!data.ok || !data.user) {
          setMsg("الحساب غير موجود");
          return;
        }

        currentMember = data.user.member_number;

        document.getElementById("rMember").textContent = data.user.member_number;
        document.getElementById("rUsername").textContent = data.user.username;
        document.getElementById("rPoints").textContent = data.user.points;
        document.getElementById("rStatus").textContent = data.user.status;

        resultBox.style.display = "block";
        setMsg("تم العثور على الحساب");
      } catch (e) {
        setMsg("حصل خطأ في الاتصال");
      }
    }

    async function changeStatus(status) {
      if (!currentMember) {
        setMsg("ابحث عن حساب أولًا");
        return;
      }

      setMsg("جاري تحديث الحالة...");

      try {
        const res = await fetch(API + "/user/" + currentMember + "/status", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ status })
        });

        const data = await res.json();

        if (!data.ok) {
          setMsg(data.error || "فشل تحديث الحالة");
          return;
        }

        await searchUser();
        setMsg("تم تحديث الحالة بنجاح");
      } catch (e) {
        setMsg("حصل خطأ أثناء تحديث الحالة");
      }
    }

    async function changePoints(amount) {
      if (!currentMember) {
        setMsg("ابحث عن حساب أولًا");
        return;
      }

      setMsg("جاري تعديل الرصيد...");

      try {
        const res = await fetch(API + "/user/" + currentMember + "/points", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ amount })
        });

        const data = await res.json();

        if (!data.ok) {
          setMsg(data.error || "فشل تعديل الرصيد");
          return;
        }

        await searchUser();
        setMsg("تم تعديل الرصيد بنجاح");
      } catch (e) {
        setMsg("حصل خطأ أثناء تعديل الرصيد");
      }
    }
  </script>

</body>
</html>
